name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run only (skip actual publish)"
        required: false
        default: "true"

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: cargo publish --dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --dry-run --allow-dirty

  build-matrix:
    name: build ${{ matrix.target }}
    needs: [validate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        if: matrix.cross
        run: cargo install --locked cross || true
      - name: Build (native)
        if: matrix.cross == false
        run: >
          cargo build --release --target ${{ matrix.target }}
          ${{ contains(matrix.target, '-musl') && '--features musl-allocator' || '' }}
      - name: Build (cross)
        if: matrix.cross
        run: >
          cross build --release --target ${{ matrix.target }}
          ${{ contains(matrix.target, '-musl') && '--features musl-allocator' || '' }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssh-cli-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/ssh-cli
            target/${{ matrix.target }}/release/ssh-cli.exe

  macos-universal:
    name: macOS Universal Binary (lipo)
    needs: [build-matrix]
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ssh-cli-x86_64-apple-darwin
          path: intel
      - uses: actions/download-artifact@v4
        with:
          name: ssh-cli-aarch64-apple-darwin
          path: arm64
      - name: lipo create
        run: |
          chmod +x intel/ssh-cli arm64/ssh-cli
          lipo -create -output ssh-cli-universal-apple-darwin intel/ssh-cli arm64/ssh-cli
          lipo -info ssh-cli-universal-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: ssh-cli-universal-apple-darwin
          path: ssh-cli-universal-apple-darwin

  publish-github-release:
    name: GitHub Release
    needs: [build-matrix, macos-universal]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Compute SHA256 checksums
        run: |
          cd artifacts
          find . -type f -exec sha256sum {} \; > ../SHA256SUMS.txt
          cd ..
          cat SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**
            SHA256SUMS.txt

  publish-crates-io:
    name: cargo publish
    needs: [publish-github-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify package
        run: cargo package --verify
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
